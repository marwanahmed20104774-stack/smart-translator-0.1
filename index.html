<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>المترجم الذكي السريع</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #eef2f3;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            background: white;
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.1);
            width: 90%;
            max-width: 500px;
            text-align: center;
        }
        h1 { color: #333; margin-bottom: 20px; font-size: 24px; }
        select, textarea {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: 2px solid #ddd;
            border-radius: 8px;
            box-sizing: border-box;
            font-size: 16px;
        }
        textarea { height: 100px; resize: none; }
        select:focus, textarea:focus {
            border-color: #007bff;
            outline: none;
        }
        .lang-section {
            display: flex;
            gap: 10px;
            justify-content: space-between;
            margin-bottom: 10px;
        }
        .lang-box {
            flex: 1;
            text-align: right;
        }
        button {
            width: 100%;
            background-color: #007bff;
            color: white;
            border: none;
            padding: 14px;
            font-size: 16px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
            margin-top: 10px;
        }
        button:hover { background-color: #0056b3; }
        .output-box {
            background: #f8f9fa;
            border-right: 4px solid #007bff;
            padding: 15px;
            margin-top: 20px;
            border-radius: 6px;
            text-align: right;
            min-height: 50px;
            font-weight: 500;
            word-wrap: break-word;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>المترجم الذكي 🌐</h1>
        
        <div class="lang-section">
            <div class="lang-box">
                <label>من لغة:</label>
                <select id="fromLang">
                    <option value="auto">كشف تلقائي ✨</option>
                    <option value="en">الإنجليزية</option>
                    <option value="ar">العربية</option>
                    <option value="fr">الفرنسية</option>
                </select>
            </div>
            <div class="lang-box">
                <label>إلى لغة:</label>
                <select id="toLang">
                    <option value="ar">العربية</option>
                    <option value="en">الإنجليزية (English)</option>
                    <option value="fr">الفرنسية (Français)</option>
                </select>
            </div>
        </div>

        <textarea id="textInput" placeholder="اكتب أي شيء هنا للترجمة..."></textarea>
        <button id="translateBtn">ترجم الآن ✨</button>
        <div class="output-box" id="outputResult">الترجمة ستظهر هنا...</div>
    </div>

    <script src="app.js"></script>
</body>
</html>
